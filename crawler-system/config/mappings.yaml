# Content Mapping Configuration
# Maps crawled content to output files

content_mappings:
  # Keywords that indicate theory content
  theory_keywords:
    - "introduction"
    - "overview"
    - "concept"
    - "what is"
    - "understanding"
    - "guide"
    - "tutorial"
    - "explanation"

  # Keywords that indicate exercises/practice
  exercises_keywords:
    - "exercise"
    - "practice"
    - "problem"
    - "challenge"
    - "quiz"
    - "test"
    - "task"
    - "homework"

  # Keywords for best practices
  best_practices_keywords:
    - "best practice"
    - "tips"
    - "recommendation"
    - "common mistake"
    - "pitfall"
    - "anti-pattern"
    - "pattern"

# Output file structure per folder
folder_structure:
  theory_file: "theory.md"
  exercises_file: "exercises.md"
  best_practices_file: "best-practices.md"
  resources_file: "resources.md"

# Crawler settings
crawler_settings:
  rate_limit_ms: 1000  # Delay between requests
  max_retries: 3
  timeout_seconds: 30
  user_agent: "Mozilla/5.0 (compatible; FullstackLearningBot/1.0)"
